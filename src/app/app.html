<h1>Progress Bar</h1>

<div class="progress-item">
  <h2>Flex 🧘🏻‍♀️ {{ flex }} / {{ maxProgress }}</h2>
  <progress [value]="flex" [max]="maxProgress"></progress>

  <input class="amount-input" #flexAmount type="number" value="5" />

  <button (click)="increaseMuscles(+flexAmount.value)">Update</button>
</div>
